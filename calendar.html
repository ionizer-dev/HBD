<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 43rd Mom❤️</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="calendar-page">

    <div class="calendar-wrapper">
        <div class="calendar-header">
            <h2>April 1983</h2>
            <p>Click on the special day to continue...</p>
        </div>

        <div class="calendar-container">
            <div class="weekday">Sun</div>
            <div class="weekday">Mon</div>
            <div class="weekday">Tue</div>
            <div class="weekday">Wed</div>
            <div class="weekday">Thu</div>
            <div class="weekday">Fri</div>
            <div class="weekday">Sat</div>

            <div class="day muted">29</div>
            <div class="day muted">30</div>
            <div class="day muted">31</div>

            <div class="day special" onclick="location.href='memories.html'">1</div>
            <div class="day">2</div>
            <div class="day">3</div>
            <div class="day">4</div>
            <div class="day">5</div>
            <div class="day">6</div>
            <div class="day">7</div>
            <div class="day">8</div>
            <div class="day">9</div>
            <div class="day">10</div>
            <div class="day">11</div>
            <div class="day">12</div>
            <div class="day">13</div>
            <div class="day">14</div>
            <div class="day">15</div>
            <div class="day">16</div>
            <div class="day">17</div>
            <div class="day">18</div>
            <div class="day">19</div>
            <div class="day">20</div>
            <div class="day">21</div>
            <div class="day">22</div>
            <div class="day">23</div>
            <div class="day">24</div>
            <div class="day">25</div>
            <div class="day">26</div>
            <div class="day">27</div>
            <div class="day">28</div>
            <div class="day">29</div>
            <div class="day">30</div>

            <div class="day muted">1</div>
            <div class="day muted">2</div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="assets/SpotiDownloader.com - The Best Day (Taylor's Version) - Taylor Swift.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener('click', () => {
            const music = document.getElementById('bgMusic');
            if (music && music.paused) music.play();
        }, { once: true });
    </script>

</body>
</html>
